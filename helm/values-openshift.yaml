# Values for access-rh-mcp on OpenShift
# Usage: helm upgrade --install access-rh-mcp ./helm -f ./helm/values-openshift.yaml -n your-namespace

replicaCount: 1

image:
  repository: images.paas.redhat.com/unifai/access-rh-mcp
  pullPolicy: Always
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podLabels:
  paas.redhat.com/appcode: TAG-001

# IMPORTANT: OpenShift assigns these from the namespace's SCC range
# Do NOT set fsGroup or runAsUser - let OpenShift assign them
podSecurityContext: {}

# Container security context - only set what OpenShift allows
securityContext:
  capabilities:
    drop:
      - ALL
  allowPrivilegeEscalation: false
  runAsNonRoot: true

service:
  type: ClusterIP
  port: 3000
  targetPort: 3000

# Environment variables for the application
env:
  MCP_PORT: "3000"
  MCP_HOST: "0.0.0.0"

# Health check configuration
healthCheck:
  enabled: true
  path: /health
  initialDelaySeconds: 15
  periodSeconds: 30
  timeoutSeconds: 10
  successThreshold: 1
  failureThreshold: 3

# OpenShift Route configuration (HTTPS with edge TLS termination)
route:
  enabled: true
  host: ""
  annotations: {}
  termination: edge
  insecureEdgeTerminationPolicy: Redirect

# Ingress disabled (using OpenShift Route)
ingress:
  enabled: false

resources:
  limits:
    cpu: "1"
    memory: 1Gi
  requests:
    cpu: 500m
    memory: 512Mi

# Autoscaling
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

# Pod Disruption Budget
podDisruptionBudget:
  enabled: false
  minAvailable: 1

nodeSelector: {}

tolerations: []

affinity: {}
